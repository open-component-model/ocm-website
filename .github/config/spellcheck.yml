matrix:
  - name: Markdown
    aspell:
      lang: en
      ignore-case: true
      mode: markdown
    dictionary:
      wordlists:
        - .github/config/wordlist.txt
      encoding: utf-8
    pipeline:
      - pyspelling.filters.markdown:
          markdown_extensions:
            - pymdownx.superfences
      - pyspelling.filters.html:
          comments: false
          ignores:
            - code
            - pre
    sources:
      - 'content/**/*.md'
      - 'README.md'
      - 'CONTRIBUTING.md'
    default_encoding: utf-8
