name: Verify Scripts

on:
  pull_request:
    branches:
      - main
      - website/**
    paths:
      - 'assets/js/**'
      - 'eslint.config.*'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #v4

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 #v4
        with:
          node-version: 25.5.0

      - name: Install dependencies and run linters
        run: npm ci

      - name: Lint scripts
        run: npm run lint:scripts
